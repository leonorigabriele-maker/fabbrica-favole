<!DOCTYPE html><html lang="it"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<title>La Fabbrica delle Favole</title>
<meta name="description" content="Favole della buonanotte che si inventano ogni sera, su misura per il tuo bambino. Illustrate a mano.">
<link rel="icon" type="image/png" href="images/icon-512.png">
<link rel="apple-touch-icon" href="images/icon-180.png">
<meta property="og:title" content="La Fabbrica delle Favole">
<meta property="og:description" content="Favole della buonanotte che si inventano ogni sera, su misura per il tuo bambino.">
<meta property="og:image" content="https://fabbrica-favole.vercel.app/images/og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<style>
@import url('https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Comfortaa:wght@400;500;600&family=Jost:wght@300;400&family=Quicksand:wght@400;500;600&family=Lora:ital@0;1&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Lora',serif;color:#43403a;background:#fffdfb;}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg img{position:absolute;}
.wrap{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:28px 20px 60px;}
.tit{font-family:'Amatic SC',cursive;font-weight:700;color:#d4542a;line-height:.9;font-size:44px;letter-spacing:1.5px;text-align:center;}
.tit .cap{font-size:58px;}
.sub{font-family:'Amatic SC',cursive;font-weight:700;text-transform:uppercase;letter-spacing:3px;font-size:18px;color:#8c8175;margin-top:2px;text-align:center;}
.rule{display:block;margin:8px auto 2px;width:200px;height:10px;}
.sec{margin-top:22px;}
.seclabel{font-family:'Jost',sans-serif;text-transform:uppercase;letter-spacing:3px;font-size:12px;color:#b08968;margin-bottom:11px;}
.cards{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:9px;}
.card{cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 5px 11px;background:rgba(255,255,255,.92);border:1px solid #f0e8e0;border-radius:16px;transition:all .15s;}
.card.on{border-color:#e0a06a;box-shadow:0 6px 16px rgba(200,140,80,.18);}
.card img{width:58px;height:58px;object-fit:contain;}
.card .em{font-size:26px;height:58px;display:flex;align-items:center;}
.cn{font-size:11.5px;font-weight:600;color:#43403a;text-align:center;font-family:'Comfortaa',sans-serif;line-height:1.05;}
.cd{font-size:9.5px;line-height:1.15;text-align:center;font-style:italic;color:#a99a86;}
.input{width:100%;font-family:'Lora';font-size:16px;color:#43403a;background:rgba(255,255,255,.95);border:1px solid #f0e8e0;border-radius:13px;padding:12px 15px;outline:none;}
.input:focus{border-color:#e0a06a;}
.nome{margin-top:10px;display:none;}
.grid{margin-top:10px;display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-height:220px;overflow-y:auto;padding:4px;background:rgba(255,255,255,.6);border-radius:14px;border:1px solid #f3ece2;}
.obj{cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:11px;border:1px solid transparent;}
.obj.on{border-color:#e0a06a;background:#fff;}
.obj img{width:42px;height:42px;object-fit:contain;}
.obj span{font-size:9px;color:#9a8b78;font-family:'Comfortaa';}
.pills{display:flex;gap:8px;flex-wrap:wrap;}
.pill{flex:1;min-width:80px;cursor:pointer;font-family:'Lora';font-size:14px;color:#8c8175;background:rgba(255,255,255,.92);border:1px solid #f0e8e0;border-radius:12px;padding:10px 6px;text-align:center;}
.pill.on{background:#e8956a;border-color:#e8956a;color:#fff;}
.cta{width:100%;margin-top:24px;cursor:pointer;border:none;font-family:'Comfortaa',sans-serif;font-weight:600;font-size:19px;color:#fff;background:#d4542a;border-radius:16px;padding:15px;box-shadow:0 10px 24px rgba(212,84,42,.26);}
.book{position:fixed;inset:0;z-index:50;display:none;}
.book.show{display:block;}
.viewport{position:relative;width:100%;max-width:560px;height:100%;margin:0 auto;overflow:hidden;background:#fffdfb;box-shadow:0 0 50px rgba(0,0,0,.18);}
.track{display:flex;height:100%;transition:transform .42s cubic-bezier(.6,.15,.2,1);}
.page{min-width:100%;height:100%;position:relative;display:flex;flex-direction:column;background-color:#fffdfb;background-size:cover;background-position:top center;background-repeat:no-repeat;}
.sfondo-strip{height:38vh;flex-shrink:0;overflow:hidden;background-size:cover;background-repeat:no-repeat;position:relative;}
.sfondo-strip::after{content:"";position:absolute;left:0;right:0;height:90px;pointer-events:none;}
.sfondo-strip:not(.bot)::after{bottom:0;background:linear-gradient(to bottom,rgba(255,253,251,0),#fffdfb);}
.sfondo-strip.bot::after{top:0;background:linear-gradient(to top,rgba(255,253,251,0),#fffdfb);}
.content-row{flex:1;display:flex;flex-direction:row;overflow:hidden;background:#fffdfb;align-items:flex-start;padding-top:16px;}
.illu{width:140px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:12px;}
.illu img{max-width:116px;max-height:26vh;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.13));}
.ptxt{flex:1;display:flex;align-items:center;font-family:'Quicksand',sans-serif;font-weight:600;font-size:18px;line-height:1.62;color:#39342c;padding:14px 16px 14px 8px;text-align:center;overflow-y:auto;}
.cover{justify-content:flex-start;}
.cover .ctit{position:relative;z-index:2;text-align:center;padding:62px 30px 0;font-family:'Amatic SC',cursive;font-weight:700;color:#d4542a;font-size:42px;line-height:.92;text-shadow:0 1px 6px rgba(255,253,251,.85);}
.cover .chero{position:relative;z-index:2;margin-top:auto;align-self:center;width:150px;margin-bottom:100px;filter:drop-shadow(0 8px 12px rgba(0,0,0,.14));}
.cover .hint{position:absolute;bottom:58px;left:0;right:0;text-align:center;font-family:'Comfortaa';font-size:13px;color:#8c7355;z-index:2;}
.fine{justify-content:center;}
.fine .ft{font-family:'Comfortaa';font-weight:600;font-size:32px;color:#d4542a;text-align:center;}
.bar{position:absolute;left:0;right:0;bottom:54px;display:flex;gap:9px;padding:0 26px;z-index:3;}
.b{flex:1;font-family:'Comfortaa';font-size:13px;color:#8c7d6a;background:rgba(255,255,255,.88);border:1px solid #efe2d2;border-radius:12px;padding:11px 4px;text-align:center;cursor:pointer;}
.b.go{background:#d4542a;color:#fff;border-color:#d4542a;}
.dots{position:absolute;bottom:24px;left:0;right:0;display:flex;gap:7px;justify-content:center;z-index:6;flex-wrap:wrap;padding:0 20px;}
.dot{width:7px;height:7px;border-radius:50%;background:#cdbca6;transition:all .2s;}
.dot.on{background:#d4542a;width:20px;border-radius:4px;}
.arrow{position:absolute;top:50px;bottom:96px;width:32%;z-index:4;border:none;background:transparent;cursor:pointer;}
.arrow.l{left:0;}.arrow.r{right:0;}
.close{position:absolute;top:14px;left:16px;z-index:7;font-family:'Comfortaa';font-size:13px;color:#8c7355;background:rgba(255,255,255,.8);border:1px solid #efe2d2;border-radius:10px;padding:7px 11px;cursor:pointer;}
.load{position:fixed;inset:0;z-index:60;background:#fffdfb;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.load.show{display:flex;}
.load .moon{font-size:50px;animation:sway 2s ease-in-out infinite;}
.load p{font-family:'Comfortaa';color:#b08968;font-size:15px;}
@keyframes sway{0%,100%{transform:translateY(0) rotate(-6deg);}50%{transform:translateY(-8px) rotate(6deg);}}
.raccolta-btn{width:100%;margin-top:11px;cursor:pointer;border:1px solid #f0e8e0;font-family:'Comfortaa',sans-serif;font-weight:600;font-size:15px;color:#b08968;background:rgba(255,255,255,.7);border-radius:14px;padding:12px;}
.raccolta{position:fixed;inset:0;z-index:55;background:#fffdfb;display:none;flex-direction:column;}
.raccolta.show{display:flex;}
.racc-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 14px;border-bottom:1px solid #f0e8e0;flex-shrink:0;}
.racc-title{font-family:'Amatic SC',cursive;font-weight:700;font-size:30px;color:#d4542a;}
.racc-close{border:none;background:none;font-size:22px;color:#b08968;cursor:pointer;padding:6px;}
.racc-list{flex:1;overflow-y:auto;padding:16px 18px;max-width:600px;width:100%;margin:0 auto;}
.fav-card{background:#fff;border:1px solid #f0e8e0;border-radius:16px;padding:14px 16px;margin-bottom:12px;cursor:pointer;position:relative;transition:background .15s;}
.fav-card:active{background:#fef8f3;}
.fav-titolo{font-family:'Comfortaa',sans-serif;font-weight:600;font-size:16px;color:#43403a;padding-right:28px;}
.fav-meta{font-size:13px;color:#a99a86;margin-top:4px;font-style:italic;}
.fav-del{position:absolute;top:12px;right:12px;border:none;background:none;font-size:18px;color:#d4c4b4;cursor:pointer;padding:4px;line-height:1;}
.racc-empty{text-align:center;padding:60px 20px;color:#b08968;font-family:'Comfortaa';font-size:15px;line-height:1.7;}
.err{position:fixed;inset:0;z-index:60;background:#fffdfb;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;text-align:center;}
.err.show{display:flex;}
</style></head>
<body>
<div class="bg" id="cornerbg"></div>
<div class="wrap" id="crea">
  <div class="tit"><span class="cap">L</span>A <span class="cap">F</span>ABBRICA <span class="cap">D</span>ELLE <span class="cap">F</span>AVOLE</div>
  <div class="sub">storie che si inventano ogni sera</div>
  <svg class="rule" viewBox="0 0 200 10"><path d="M3 6 C 55 1,150 9,197 4" stroke="#e0602a" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>
  <div class="sec"><div class="seclabel">Chi vive la storia</div><div class="cards" id="cards"></div>
    <input class="input nome" id="nome" placeholder="il nome del tuo bimbo" maxlength="20"/></div>
  <div class="sec"><div class="seclabel">Una cosa di ogni giorno</div>
    <input class="input" id="cosa" placeholder="scrivi o cerca (anche: sbadiglio, silenzio...)" value="calzino"/>
    <div class="grid" id="grid"></div></div>
  <div class="sec"><div class="seclabel">Atmosfera</div><div class="pills" id="atm"></div></div>
  <div class="sec"><div class="seclabel">Età</div><div class="pills" id="eta"></div></div>
  <div class="sec"><div class="seclabel">Lunghezza</div><div class="pills" id="len"></div></div>
  <button class="cta" id="go">Inventa la favola</button>
  <button class="raccolta-btn" id="openRaccolta">📚 Le tue favole <span id="favCount"></span></button>
</div>
<div class="load" id="load"><div class="moon">🌙</div><p>Sto inventando la favola…</p></div>
<div class="err" id="err"><div style="font-size:40px">😴</div><p id="errmsg" style="font-family:Comfortaa;color:#8c7355"></p><button class="b" style="max-width:200px" onclick="document.getElementById('err').classList.remove('show')">riprova</button></div>
<div class="book" id="book">
  <div class="viewport">
    <div class="track" id="track"></div>
    <button class="arrow l" id="prev"></button>
    <button class="arrow r" id="next"></button>
    <div class="close" id="close">‹ torna</div>
    <div class="dots" id="dots"></div>
  </div>
</div>
<script>
var CHARDIR="images/", OBJDIR="images/objects/", SFDIR="images/sfondi/";
var PERS=[{id:"bimbo",nome:"Il tuo bimbo",desc:"il protagonista sei tu"},{id:"lalla",nome:"Lalla",desc:"fa domande impossibili"},{id:"tobia",nome:"Tobia",desc:"lascia tutto a metà"},{id:"nuvola",nome:"Donna Nuvola",desc:"fa mestieri impossibili"},{id:"prof",nome:"Professore",desc:"inventa oggetti assurdi"},{id:"mimi",nome:"Mimì",desc:"fa tutto al rovescio"},{id:"nino",nome:"Nino",desc:"sente parlare le cose"},{id:"sorpresa",nome:"Sorprendimi",desc:"scegli a caso"}];
var OGGETTI=["luna","calzino","bottone","valigia","palloncino","stella","chiave","ombrello","cappello","barattolo","cucchiaio","libro","candela","sveglia","aquilone","cannocchiale","pera","gomitolo","conchiglia","fiocco","semaforo","albero","bicicletta","auto","letto","nuvola","sedia","porta","telefono","fiore"];
var S={chi:"lalla",atm:"dolce",eta:"4-5 anni",len:"media"};
var $=function(id){return document.getElementById(id);};
function charImg(id){return CHARDIR+(id==="bimbo"?"bimbo":id)+".png";}
$("cards").innerHTML=PERS.map(function(p){var inner=(p.id==="sorpresa")?'<span class="em">🎲</span>':'<img src="'+charImg(p.id)+'">';return '<button class="card" data-id="'+p.id+'">'+inner+'<span class="cn">'+p.nome+'</span><span class="cd">'+p.desc+'</span></button>';}).join("");
function drawGrid(f){f=(f||"").toLowerCase();$("grid").innerHTML=OGGETTI.filter(function(o){return o.indexOf(f)>=0;}).map(function(o){return '<div class="obj" data-o="'+o+'"><img src="'+OBJDIR+o+'.png"><span>'+o+'</span></div>';}).join("");document.querySelectorAll(".obj").forEach(function(e){e.onclick=function(){$("cosa").value=e.dataset.o;document.querySelectorAll(".obj").forEach(function(x){x.classList.remove("on");});e.classList.add("on");};});}
drawGrid("");
var PILLS={atm:["dolce","buffa","poetica"],eta:["2-3 anni","4-5 anni","6-7 anni"],len:["cortissima","media","della buonanotte"]};
["atm","eta","len"].forEach(function(k){$(k).innerHTML=PILLS[k].map(function(a){return '<button class="pill" data-v="'+a+'">'+a+'</button>';}).join("");});
function refresh(){document.querySelectorAll("#cards .card").forEach(function(e){e.classList.toggle("on",e.dataset.id===S.chi);});["atm","eta","len"].forEach(function(k){$(k).querySelectorAll(".pill").forEach(function(e){e.classList.toggle("on",e.dataset.v===S[k]);});});$("nome").style.display=(S.chi==="bimbo")?"block":"none";}
document.querySelectorAll("#cards .card").forEach(function(e){e.onclick=function(){S.chi=e.dataset.id;refresh();};});
["atm","eta","len"].forEach(function(k){$(k).querySelectorAll(".pill").forEach(function(e){e.onclick=function(){S[k]=e.dataset.v;refresh();};});});
$("cosa").oninput=function(e){drawGrid(e.target.value);};
refresh();

var VALID_POSES=["fermo","seduto","sorpreso","cammina","dorme","esulta"];
function poseImg(chi,img){
  if(!img||img==="protagonista") return charImg(chi);
  if(img.startsWith("protagonista_")){
    var p=img.replace("protagonista_","");
    if(VALID_POSES.indexOf(p)>=0) return "images/poses/poses/"+chi+"_"+p+".png";
    return charImg(chi);
  }
  return OBJDIR+img+".png";
}
function render(fav){
  var chi=fav.chi||S.chi; var heroImg=charImg(chi==="sorpresa"?"lalla":chi);
  var scene=fav.scene||[];
  var cover='<div class="page cover" style="background-image:url('+SFDIR+(scene[0]&&scene[0].sfondo||"notte")+'.jpg)"><div class="ctit">'+(fav.titolo||"La favola")+'</div><img class="chero" src="'+heroImg+'"><div class="hint">tocca a destra per sfogliare ›</div></div>';
  var SFPOS={"notte":"top","nuvole":"top","bosco":"top","cameretta":"top","citta":"bottom","mare":"bottom"};
  var pagine=scene.map(function(s){var img=poseImg(chi,s.img);var pos=SFPOS[s.sfondo]||"top";var isBot=(pos==="bottom");var strip='<div class="sfondo-strip'+(isBot?' bot':'')+'" style="background-image:url('+SFDIR+s.sfondo+'.jpg);background-position:'+pos+' center"></div>';var crow='<div class="content-row"><div class="illu"><img src="'+img+'" onerror="this.onerror=null;this.src=\''+charImg(chi)+'\'"></div><div class="ptxt">'+s.testo+'</div></div>';return '<div class="page">'+(isBot?crow+strip:strip+crow)+'</div>';}).join("");
  var fine='<div class="page fine" style="background-image:url('+SFDIR+((scene[scene.length-1]&&scene[scene.length-1].sfondo)||"notte")+'.jpg)"><div class="ft">Fine 🌙</div><div class="bar"><div class="b go" id="altra">↻ Un\'altra favola</div><div class="b" id="salva">♥ Salva</div></div></div>';
  $("track").innerHTML=cover+pagine+fine;
  N=scene.length+2; idx=0;
  $("dots").innerHTML=Array.apply(null,{length:N}).map(function(_,i){return '<span class="dot'+(i===0?' on':'')+'"></span>';}).join("");
  $("track").style.transform="translateX(0)";
  $("altra").onclick=function(){genera();}; $("salva").onclick=salva;
}
function go(i){idx=Math.max(0,Math.min(N-1,i));$("track").style.transform="translateX(-"+(idx*100)+"%)";document.querySelectorAll(".dot").forEach(function(d,j){d.classList.toggle("on",j===idx);});}
$("next").onclick=function(){go(idx+1);};
$("prev").onclick=function(){go(idx-1);};
$("close").onclick=function(){$("book").classList.remove("show");};
var x0=null;var vp=document.querySelector(".viewport");
vp.addEventListener("touchstart",function(e){x0=e.touches[0].clientX;},{passive:true});
vp.addEventListener("touchend",function(e){if(x0===null)return;var dx=e.changedTouches[0].clientX-x0;if(dx<-40)go(idx+1);else if(dx>40)go(idx-1);x0=null;});
function updateCount(){try{var arr=JSON.parse(localStorage.getItem("favole")||"[]");var el=$("favCount");if(el)el.textContent=arr.length>0?"("+arr.length+")":"";}catch(e){}}
function salva(){try{if(!lastFav)return;var arr=JSON.parse(localStorage.getItem("favole")||"[]");var fav=JSON.parse(JSON.stringify(lastFav));fav._data=new Date().toLocaleDateString("it-IT");arr.unshift(fav);localStorage.setItem("favole",JSON.stringify(arr));$("salva").textContent="♥ Salvata";updateCount();}catch(e){}}
function renderRaccolta(){
  try{
    var arr=JSON.parse(localStorage.getItem("favole")||"[]");
    if(!arr.length){$("raccList").innerHTML='<div class="racc-empty">Ancora nessuna favola salvata. 🌙<br><br>Premi ♥ Salva dopo aver letto una favola per aggiungerla qui.</div>';return;}
    var NOMI={lalla:"Lalla",tobia:"Tobia",nuvola:"Donna Nuvola",prof:"Professore",mimi:"Mimì",nino:"Nino",bimbo:"il tuo bimbo"};
    $("raccList").innerHTML=arr.map(function(f,i){var nome=NOMI[f.chi]||f.chi||"";return '<div class="fav-card" data-i="'+i+'"><button class="fav-del" data-i="'+i+'">✕</button><div class="fav-titolo">'+f.titolo+'</div><div class="fav-meta">'+nome+(f._data?' · '+f._data:'')+'</div></div>';}).join("");
    document.querySelectorAll(".fav-card").forEach(function(el){el.onclick=function(e){if(e.target.classList.contains("fav-del"))return;var arr2=JSON.parse(localStorage.getItem("favole")||"[]");var fav=arr2[parseInt(el.dataset.i)];if(!fav)return;lastFav=fav;render(fav);$("raccolta").classList.remove("show");$("book").classList.add("show");};});
    document.querySelectorAll(".fav-del").forEach(function(btn){btn.onclick=function(e){e.stopPropagation();var arr2=JSON.parse(localStorage.getItem("favole")||"[]");arr2.splice(parseInt(btn.dataset.i),1);localStorage.setItem("favole",JSON.stringify(arr2));updateCount();renderRaccolta();};});
  }catch(e){$("raccList").innerHTML='<div class="racc-empty">Errore nel caricare le favole.</div>';}
}
var idx=0,N=0,lastFav=null;
document.addEventListener("click",function(e){
  if(e.target.closest("#openRaccolta")){renderRaccolta();$("raccolta").classList.add("show");}
  if(e.target.closest("#closeRaccolta")){$("raccolta").classList.remove("show");}
});
updateCount();
function genera(){
  $("load").classList.add("show");
  var body={chi:S.chi,nome:$("nome").value.trim(),cosa:($("cosa").value.trim()||"una cosa"),atmosfera:S.atm,eta:S.eta,lunghezza:S.len};
  fetch("/api/favola",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)})
   .then(function(r){return r.json();})
   .then(function(fav){$("load").classList.remove("show");if(!fav.scene){throw new Error(fav.error||"vuota");}lastFav=fav;render(fav);$("book").classList.add("show");})
   .catch(function(e){$("load").classList.remove("show");$("errmsg").textContent="Ops, la favola non è arrivata. Riprova tra un momento.";$("err").classList.add("show");});
}
$("go").onclick=genera;
[["azzurro",-7,-3,150,15],["rosa",83,5,135,-20],["giallo",-8,30,140,40]].forEach(function(a){var im=document.createElement("img");im.src="images/splatter/"+a[0]+".png";im.style.left=a[1]+"%";im.style.top=a[2]+"%";im.style.width=a[3]+"px";im.style.transform="rotate("+a[4]+"deg)";im.onerror=function(){this.remove();};$("cornerbg").appendChild(im);});
</script>
<div class="raccolta" id="raccolta">
  <div class="racc-head">
    <div class="racc-title">📚 Le tue favole</div>
    <button class="racc-close" id="closeRaccolta">✕</button>
  </div>
  <div class="racc-list" id="raccList"></div>
</div>
</body></html>
